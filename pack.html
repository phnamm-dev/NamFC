<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nam FC</title>
    <link rel="stylesheet" href="phamhoangnam.pack.css">
</head>
<body>
<!-- LOADING OVERLAY -->
<div id="loading-overlay">
    <div style="text-align: center;">
        <div class="loader"></div>
        <div class="loading-text">Đang tải...</div>
    </div>
</div>
<div class="pack-screen">
    <div class="info-bar"><span id="moneyAmount">0</span> NC</div>
    <div class="pack-type-badge" id="packTypeBadge">CHƯA CHỌN PACK</div>
    <div class="progress-info" id="progressInfo"></div>

    <div class="pack-container">
        <img id="pack-image" src="images/packs/default_pack.png" alt="FIFA Pack" onclick="startPackOpening()">
        <div class="pack-title">ẤN ĐỂ MỞ</div>
    </div>

    <div id="animation-stage">
        <div id="item-flag" class="reveal-item"><img id="flag-img" class="flag" src="" alt=""></div>
        <div id="item-pos" class="reveal-item"><div id="pos-text" class="pos-ovr"></div></div>
        <div id="item-club" class="reveal-item">
            <img id="club-logo-img" class="club-logo" src="" alt="">
            <div id="club-name-text" class="club-info"></div>
        </div>
        <div class="skip-hint">NHẤP BẤT KỲ ĐÂU ĐỂ SKIP</div>
    </div>

    <div id="player-reveal"></div>

    <div id="resultGrid" class="result-grid">
        <h2>BẠN ĐÃ NHẬN ĐƯỢC</h2>
        <div id="resultPlayersGrid" class="players-grid"></div>
        <button id="closeResultBtn" class="close-result-btn">NHẬN TẤT CẢ</button>
    </div>
    
    <div class="copyright">
        &copy; Pham Hoang Nam
    </div>
</div>

<script src="js/players.js"></script>
<script src="phamhoangnam.pack.js"></script>
</body>
</html>
