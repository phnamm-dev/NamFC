<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nam FC - Sân tập 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 100;
            border-left: 4px solid gold;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 20px;
            color: #ccc;
            background: rgba(20,20,20,0.7);
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 100;
        }
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            color: gold;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">⚽ NAM FC - SÂN TẬP (WASD di chuyển, SPACE sút)</div>
    <div id="controls">🕹️ W A S D: Di chuyển | SPACE: Sút bóng | R: Đặt lại bóng</div>
    <div id="score">🥅 0 - 0</div>

    <!-- Import Three.js và Cannon.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import * as CANNON from 'cannon-es';

        // --- Khởi tạo Scene, Camera, Renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x112233); // Màu trời tối
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 15, 30);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // CSS2 Renderer cho label
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';  // cho phép click xuyên qua
        document.body.appendChild(labelRenderer.domElement);

        // --- Vật lý World (Cannon) ---
        const world = new CANNON.World();
        world.gravity = new CANNON.Vec3(0, -9.82, 0);
        world.broadphase = new CANNON.SAPBroadphase(world);
        world.defaultContactMaterial.restitution = 0.3;

        // Vật liệu cho bóng (nảy nhiều)
        const ballMaterial = new CANNON.Material('ball');
        const groundMaterial = new CANNON.Material('ground');
        const contactMaterial = new CANNON.ContactMaterial(ballMaterial, groundMaterial, {
            friction: 0.5,
            restitution: 0.7
        });
        world.addContactMaterial(contactMaterial);
        world.defaultContactMaterial = contactMaterial;

        // --- Ánh sáng ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 30;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4466ff, 0.5);
        fillLight.position.set(-10, 10, 10);
        scene.add(fillLight);

        // --- Tạo sân cỏ (hình chữ nhật) ---
        const groundGeometry = new THREE.BoxGeometry(40, 1, 60);
        const groundTexture = new THREE.MeshStandardMaterial({ 
            color: 0x3c8c3c,
            roughness: 0.8,
        });
        const groundMesh = new THREE.Mesh(groundGeometry, groundTexture);
        groundMesh.receiveShadow = true;
        groundMesh.position.y = -0.5;
        scene.add(groundMesh);

        // Vạch sân (đường biên)
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
        const points = [
            new THREE.Vector3(-20, 0.01, -30), new THREE.Vector3(20, 0.01, -30),
            new THREE.Vector3(20, 0.01, 30), new THREE.Vector3(-20, 0.01, 30), new THREE.Vector3(-20, 0.01, -30)
        ];
        const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.Line(lineGeometry, lineMaterial);
        scene.add(line);

        // Khung thành (đơn giản)
        function createGoal(x, z, color) {
            const goalGroup = new THREE.Group();
            const barMat = new THREE.MeshStandardMaterial({ color: color });
            const postGeo = new THREE.CylinderGeometry(0.3, 0.3, 3);
            const crossbarGeo = new THREE.BoxGeometry(5, 0.2, 0.3);
            
            const leftPost = new THREE.Mesh(postGeo, barMat);
            leftPost.position.set(-2.5, 1.5, 0);
            leftPost.castShadow = true;
            leftPost.receiveShadow = true;
            goalGroup.add(leftPost);
            
            const rightPost = new THREE.Mesh(postGeo, barMat);
            rightPost.position.set(2.5, 1.5, 0);
            rightPost.castShadow = true;
            rightPost.receiveShadow = true;
            goalGroup.add(rightPost);
            
            const crossbar = new THREE.Mesh(crossbarGeo, barMat);
            crossbar.position.set(0, 3, 0);
            crossbar.castShadow = true;
            crossbar.receiveShadow = true;
            goalGroup.add(crossbar);
            
            goalGroup.position.set(x, 0, z);
            return goalGroup;
        }

        scene.add(createGoal(0, -29, 0xffaa00)); // Khung thành phía xa
        scene.add(createGoal(0, 29, 0x00aaff));  // Khung thành gần

        // Vật lý mặt đất
        const groundBody = new CANNON.Body({ mass: 0, material: groundMaterial });
        groundBody.addShape(new CANNON.Box(new CANNON.Vec3(20, 0.5, 30)));
        groundBody.position.y = -0.5;
        world.addBody(groundBody);

        // Tường bao (để bóng không bay ra ngoài)
        const wallMaterial = new CANNON.Material('wall');
        const wallContact = new CANNON.ContactMaterial(ballMaterial, wallMaterial, { friction: 0.5, restitution: 0.5 });
        world.addContactMaterial(wallContact);
        
        const walls = [
            { pos: [0, 1, -30.5], size: [20, 1, 0.5] }, // sau khung thành xa
            { pos: [0, 1, 30.5], size: [20, 1, 0.5] },  // sau khung thành gần
            { pos: [-20.5, 1, 0], size: [0.5, 1, 30] }, // biên trái
            { pos: [20.5, 1, 0], size: [0.5, 1, 30] }   // biên phải
        ];
        walls.forEach(w => {
            const body = new CANNON.Body({ mass: 0, material: wallMaterial });
            body.addShape(new CANNON.Box(new CANNON.Vec3(w.size[0], w.size[1], w.size[2])));
            body.position.set(w.pos[0], w.pos[1], w.pos[2]);
            world.addBody(body);
        });

        // --- Tạo cầu thủ (hình trụ + hộp) ---
        const playerGroup = new THREE.Group();
        const bodyGeo = new THREE.CylinderGeometry(0.8, 0.8, 1.8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3366ff, emissive: new THREE.Color(0x112233) });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        body.position.y = 0.9;
        playerGroup.add(body);
        
        const headGeo = new THREE.SphereGeometry(0.5);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
        const head = new THREE.Mesh(headGeo, headMat);
        head.castShadow = true;
        head.receiveShadow = true;
        head.position.y = 1.9;
        playerGroup.add(head);
        
        playerGroup.position.set(0, 0, 10);
        playerGroup.traverse(obj => { if(obj.isMesh) obj.castShadow = true; });
        scene.add(playerGroup);

        // --- Tạo bóng ---
        const ballMesh = new THREE.Mesh(
            new THREE.SphereGeometry(0.5, 32, 16),
            new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: new THREE.Color(0x222222), roughness: 0.3 })
        );
        ballMesh.castShadow = true;
        ballMesh.receiveShadow = true;
        scene.add(ballMesh);
        
        const ballBody = new CANNON.Body({ mass: 1, material: ballMaterial });
        ballBody.addShape(new CANNON.Sphere(0.5));
        ballBody.position.set(0, 0.5, 0);
        world.addBody(ballBody);

        // --- Label tên cầu thủ (CSS2DRenderer) ---
        const playerLabelDiv = document.createElement('div');
        playerLabelDiv.textContent = '⚡ NAM FC';
        playerLabelDiv.style.color = 'white';
        playerLabelDiv.style.fontSize = '14px';
        playerLabelDiv.style.fontWeight = 'bold';
        playerLabelDiv.style.textShadow = '1px 1px 3px black';
        playerLabelDiv.style.backgroundColor = 'rgba(0,0,0,0.5)';
        playerLabelDiv.style.padding = '2px 12px';
        playerLabelDiv.style.borderRadius = '20px';
        playerLabelDiv.style.pointerEvents = 'none';
        playerLabelDiv.style.border = '1px solid gold';
        
        const playerLabel = new CSS2DObject(playerLabelDiv);
        playerLabel.position.set(0, 2.8, 0);
        playerGroup.add(playerLabel);

        // --- Điều khiển ---
        const keyState = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keyState.w = true; e.preventDefault(); break;
                case 'KeyA': keyState.a = true; e.preventDefault(); break;
                case 'KeyS': keyState.s = true; e.preventDefault(); break;
                case 'KeyD': keyState.d = true; e.preventDefault(); break;
                case 'Space': kickBall(); e.preventDefault(); break;
                case 'KeyR': resetBall(); e.preventDefault(); break;
            }
        });
        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keyState.w = false; e.preventDefault(); break;
                case 'KeyA': keyState.a = false; e.preventDefault(); break;
                case 'KeyS': keyState.s = false; e.preventDefault(); break;
                case 'KeyD': keyState.d = false; e.preventDefault(); break;
            }
        });

        function kickBall() {
            const playerPos = playerGroup.position;
            const ballPos = ballBody.position;
            const dx = ballPos.x - playerPos.x;
            const dz = ballPos.z - playerPos.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            if (dist < 2.5) {
                const force = 15;
                const dir = new CANNON.Vec3(dx, 0.2, dz).normalize();
                ballBody.applyImpulse(dir.scale(force), ballBody.position);
            }
        }

        function resetBall() {
            ballBody.position.set(0, 0.5, 0);
            ballBody.velocity.set(0,0,0);
            ballBody.angularVelocity.set(0,0,0);
        }

        // Camera theo cầu thủ (góc nhìn thứ ba đơn giản)
        function updateCamera() {
            const pos = playerGroup.position;
            camera.position.x = pos.x + 15;
            camera.position.y = 12;
            camera.position.z = pos.z + 15;
            camera.lookAt(pos.x, 1, pos.z);
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Di chuyển cầu thủ
            const speed = 0.15;
            const moveX = (keyState.d ? 1 : 0) - (keyState.a ? 1 : 0);
            const moveZ = (keyState.s ? 1 : 0) - (keyState.w ? 1 : 0);
            if (moveX !== 0 || moveZ !== 0) {
                playerGroup.position.x += moveX * speed;
                playerGroup.position.z += moveZ * speed;
                // Giới hạn trong sân
                playerGroup.position.x = Math.max(-18, Math.min(18, playerGroup.position.x));
                playerGroup.position.z = Math.max(-28, Math.min(28, playerGroup.position.z));
            }
            
            // Đồng bộ vật lý
            world.step(1/60);
            ballMesh.position.copy(ballBody.position);
            ballMesh.quaternion.copy(ballBody.quaternion);
            
            updateCamera();
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();

        // --- Resize handler ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        console.log('🔥 Sân tập Nam FC đã sẵn sàng!');
    </script>
</body>
</html>
