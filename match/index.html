<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nam FC - Lobby</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a1f0a; color: white; font-family: Arial; text-align: center; padding: 20px; }
        .btn { padding: 15px 30px; background: gold; color: black; border: none; border-radius: 50px; font-weight: bold; margin: 10px; cursor: pointer; }
        input { padding: 12px; border-radius: 20px; border: none; font-size: 1.2rem; text-align: center; }
        .section { margin: 20px 0; }
    </style>
</head>
<body>
    <div id="loginPanel">
        <h2>NHẬP TÊN CHIẾN BINH</h2>
        <input type="text" id="usernameInput" placeholder="Tên của bạn" maxlength="15">
        <br><button class="btn" id="btnLogin">VÀO ĐẤU TRƯỜNG</button>
        <p id="loginError" style="color: orange;"></p>
    </div>

    <div id="modePanel" style="display: none;">
        <h2>CHỌN CHẾ ĐỘ</h2>
        <button class="btn" id="btnRandom">🔍 GHÉP NGẪU NHIÊN (1v1)</button>
        <button class="btn" id="btnRoom">🏠 TẠO / VÀO PHÒNG</button>
        <p id="userDisplay"></p>
    </div>

    <div id="randomPanel" style="display: none;">
        <p>Đang tìm đối thủ...</p>
        <p id="queueStatus"></p>
        <button class="btn" id="btnCancelQueue">HỦY</button>
    </div>

    <div id="roomPanel" style="display: none;">
        <button class="btn" id="btnCreateRoom">TẠO PHÒNG MỚI</button>
        <br><br>
        <input type="text" id="roomCodeInput" placeholder="Mã phòng">
        <br><button class="btn" id="btnJoinRoom">VÀO PHÒNG</button>
        <p id="roomStatus"></p>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        // TỰ ĐỘNG DÙNG URL HIỆN TẠI LÀM SUPABASE URL (đi qua proxy của server)
        const supabase = createClient(
            window.location.origin,  // http://localhost:5500
            'anonymous',              // Key giả, server sẽ thay bằng Service Key
            {
                auth: {
                    autoRefreshToken: false,
                    persistSession: true,
                    detectSessionInUrl: false
                },
                global: {
                    headers: { 'x-application-name': 'namfc' }
                }
            }
        );
        
        let currentUser = null;
        let myUsername = localStorage.getItem('myUsername');

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
            } else {
                const { data, error } = await supabase.auth.signInAnonymously();
                if (error) { alert('Lỗi kết nối! Vui lòng thử lại sau.'); return; }
                currentUser = data.user;
            }

            if (myUsername) showModePanel();
        }

        document.getElementById('btnLogin').addEventListener('click', async () => {
            let name = document.getElementById('usernameInput').value.trim();
            if (!name) return;
            
            const finalName = await getUniqueUsername(name);
            myUsername = finalName;
            localStorage.setItem('myUsername', finalName);
            showModePanel();
        });

        async function getUniqueUsername(baseName) {
            let name = baseName;
            let suffix = 0;
            while (true) {
                const { data } = await supabase.from('usernames').select('username').eq('username', name).single();
                if (!data) break;
                suffix++;
                name = baseName + suffix;
            }
            await supabase.from('usernames').upsert({ username: name, user_id: currentUser.id });
            return name;
        }

        function showModePanel() {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('modePanel').style.display = 'block';
            document.getElementById('userDisplay').innerText = 'Xin chào: ' + myUsername;
        }

        document.getElementById('btnRandom').addEventListener('click', () => {
            document.getElementById('modePanel').style.display = 'none';
            document.getElementById('randomPanel').style.display = 'block';
            startRandomQueue();
        });

        document.getElementById('btnRoom').addEventListener('click', () => {
            document.getElementById('modePanel').style.display = 'none';
            document.getElementById('roomPanel').style.display = 'block';
        });

        async function startRandomQueue() {
            await supabase.from('matchmaking_queue').upsert({ user_id: currentUser.id, selected_pack: 'any' });
            document.getElementById('queueStatus').innerText = 'Chờ người chơi khác...';

            supabase.channel('random-room-' + currentUser.id)
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'match_rooms', filter: `player1_id=eq.${currentUser.id}` }, (payload) => {
                    window.location.href = `/match/play.html?roomId=${payload.new.id}`;
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'match_rooms', filter: `player2_id=eq.${currentUser.id}` }, (payload) => {
                    window.location.href = `/match/play.html?roomId=${payload.new.id}`;
                })
                .subscribe();
        }

        document.getElementById('btnCancelQueue').addEventListener('click', async () => {
            await supabase.from('matchmaking_queue').delete().eq('user_id', currentUser.id);
            document.getElementById('randomPanel').style.display = 'none';
            document.getElementById('modePanel').style.display = 'block';
        });

        document.getElementById('btnCreateRoom').addEventListener('click', async () => {
            const username = localStorage.getItem('myUsername');
            const response = await fetch('/api/rooms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            const data = await response.json();
            if (response.ok) {
                alert('Mã phòng: ' + data.room_code);
                window.location.href = `/match/play.html?roomId=${data.id}`;
            } else {
                alert('Lỗi: ' + data.error);
            }
        });
        
        document.getElementById('btnJoinRoom').addEventListener('click', async () => {
            const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            const username = localStorage.getItem('myUsername');
            const response = await fetch('/api/rooms/join', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, username })
            });
            const data = await response.json();
            if (response.ok) {
                window.location.href = `/match/play.html?roomId=${data.roomId}`;
            } else {
                alert('Lỗi: ' + data.error);
            }
        });

        await init();
    </script>
</body>
</html>
