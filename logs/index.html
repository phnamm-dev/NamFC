<!DOCTYPE html>
<html lang="vi">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
		<title>Nam FC Online · Nhật ký phiên bản</title>
		<!-- Font Awesome -->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
		<!-- Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="phamhoangnam.logs.css">
	</head>
	<body>
		<div class="changelog-master">
			<!-- Header giữ nguyên -->
			<div class="log-header">
				<div class="brand">
					<div class="brand-icon"><i class="fas fa-futbol"></i></div>
					<div class="brand-text">
						<h1>Nam FC Online</h1>
						<div class="subhead">
							<i class="fas fa-code-branch"></i> 
							<span>Logs · Cập nhật mỗi ngày</span>
							<span class="transform-badge"><i class="fas fa-magic"></i> Cập nhật bởi Nam</span>
						</div>
					</div>
				</div>
				<div class="pill-badge">
					<i class="fas fa-bolt"></i> 
					<span>Live</span>
				</div>
			</div>
			<!-- Tiêu đề danh sách -->
			<div class="section-title">
				<h2><i class="fas fa-clock-rotate-left"></i> Danh sách các bản cập nhật</h2>
				<span class="version-count" id="monthDisplay">Tháng 4 năm 2026</span>
			</div>
			<!-- KHU VỰC LOG ĐỘNG – SẼ ĐƯỢC JAVASCRIPT RENDER -->
			<div id="dynamicLogContainer"></div>
			<!-- Dòng nhấn mạnh -->
			<div style="margin: 1.2rem 0 0.2rem; display: flex; justify-content: flex-end;">
				<div style="display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 0.5rem 1.2rem; border-radius: 60px; border: 0.5px solid #e2e8f0;">
					<i class="fas fa-robot" style="color: #2563eb;"></i>
					<span style="font-weight: 450; font-size: 0.9rem;">Nam FC Online Update Logs</span>
					<i class="fas fa-sparkles" style="color: #fbbf24;"></i>
				</div>
			</div>
			<!-- Footer -->
			<div class="log-footer">
				<div style="display: flex; align-items: center; gap: 12px;">
					<i class="far fa-copyright"></i>
					<span>Nam FC Online © Pham Hoang Nam 2026 x DeepSeek — Nhật ký cập nhật</span>
					<span style="width: 4px; height: 4px; background: #cbd5e1; border-radius: 50%;"></span>
					<span>cập nhật tự động</span>
				</div>
				<div class="footer-links">
					LOGS v26w01a DeepSeek
				</div>
			</div>
		</div>
		<script src="phamhoangnam.logs.js"></script>
	</body>
</html>
