<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nam FC Online</title>
    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Sân cỏ siêu thực */
            background: 
                repeating-linear-gradient(
                    45deg,
                    rgba(20, 80, 20, 0.3) 0px,
                    rgba(20, 80, 20, 0.3) 2px,
                    transparent 2px,
                    transparent 8px
                ),
                radial-gradient(circle at 30% 40%, #2d8c3c 0%, #1a5c25 50%, #0a3a12 100%);
            
            font-family: 'Segoe UI', 'Exo 2', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            cursor: default;
        }

        /* Đường kẻ sân bóng */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(80vw, 600px);
            height: min(80vw, 600px);
            border: 4px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: rgba(255, 255, 255, 0.06);
            pointer-events: none;
            z-index: 0;
        }

        /* Chấm cỏ 3D */
        .grass-dots {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(100, 255, 100, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 70%, rgba(255, 255, 100, 0.03) 0%, transparent 30%);
            pointer-events: none;
            z-index: 1;
        }

        /* ---------- TITLE SIÊU SPORT ---------- */
        h1 {
            font-size: clamp(3rem, 10vw, 5.5rem);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: transparent;
            letter-spacing: 2px;
            line-height: 1.1;
            margin-bottom: 60px;
            position: relative;
            z-index: 10;
            
            background: linear-gradient(
                135deg,
                #FFD700 0%,
                #FFF8DC 25%,
                #FFD700 50%,
                #FFA500 75%,
                #FFD700 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            
            animation: shine 3s linear infinite, float 4s ease-in-out infinite;
            
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.8))
                    drop-shadow(0 4px 4px #B8860B)
                    drop-shadow(0 8px 8px #00000060)
                    drop-shadow(0 0 20px #FFD70040);
            
            -webkit-text-stroke: 1px rgba(184, 134, 11, 0.5);
            text-align: center;
        }

        h1::before,
        h1::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                #FFD700 20%, 
                #FFA500 50%, 
                #FFD700 80%, 
                transparent 100%);
            box-shadow: 0 2px 10px #FFD700, 0 4px 0 #8B6914;
            transform: skewX(-25deg);
        }

        h1::before {
            bottom: -15px;
            animation: slideLine 2s ease-in-out infinite alternate;
        }

        h1::after {
            bottom: -28px;
            width: 70%;
            left: 15%;
            opacity: 0.7;
            animation: slideLine 2s ease-in-out infinite alternate-reverse;
        }

        @keyframes shine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        @keyframes slideLine {
            0% { transform: skewX(-25deg) scaleX(0.8); opacity: 0.5; }
            100% { transform: skewX(-25deg) scaleX(1); opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-1deg); }
            50% { transform: translateY(-8px) rotate(1deg); }
        }

        /* ---------- MENU BUTTONS ---------- */
        .menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 900px;
            position: relative;
            z-index: 10;
            margin-top: 20px;
        }

        .menu a {
            display: inline-block;
            background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%);
            color: #0a2f1a;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 
                0 10px 0 #8B6914,
                0 8px 20px rgba(0,0,0,0.5),
                inset 0 2px 0 rgba(255,255,255,0.6);
            transition: all 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid #FFE066;
            min-width: 210px;
            text-align: center;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        .menu a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .menu a:hover::before {
            left: 100%;
        }

        .menu a:hover {
            transform: translateY(5px);
            box-shadow: 
                0 5px 0 #8B6914,
                0 10px 20px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.8);
            background: linear-gradient(180deg, #FFE44D 0%, #FFB830 100%);
        }

        .menu a:active {
            transform: translateY(10px);
            box-shadow: 
                0 0 0 #8B6914,
                0 5px 15px rgba(0,0,0,0.5),
                inset 0 1px 5px rgba(0,0,0,0.2);
        }

        /* Version box */
        .version-box {
            position: fixed;
            bottom: 20px;
            right: 24px;
            background: rgba(10, 30, 10, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: #FFD700;
            border: 1px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            letter-spacing: 0.5px;
            z-index: 999;
            font-family: 'SF Mono', 'Fira Code', monospace;
            text-transform: uppercase;
        }

        /* ---------- TRÁI BÓNG BAY ---------- */
        .ball {
            position: fixed;
            font-size: 3.5rem;
            line-height: 1;
            pointer-events: none;  /* Cho phép click xuyên qua */
            z-index: 1000;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4));
            will-change: left, top;
            transition: transform 0.1s;
            text-shadow: 0 0 10px #FFD700;
            user-select: none;
        }

        /* Hiệu ứng vệt bóng (tùy chọn) */
        .ball::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(255,215,0,0.2) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: pulseGlow 1.5s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.2); }
        }

        /* ---------- HIỆU ỨNG CLICK (MUỐI JS) ---------- */
        .click-ripple {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, #FFD700 0%, #FFA500 80%);
            pointer-events: none;
            z-index: 2000;
            animation: rippleEffect 0.6s ease-out forwards;
            box-shadow: 0 0 20px gold;
        }

        @keyframes rippleEffect {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(8); opacity: 0; }
        }

        /* Chữ GOAL bay lên */
        .goal-popup {
            position: fixed;
            font-size: 2.5rem;
            font-weight: 900;
            color: gold;
            text-shadow: 3px 3px 0 #000, 0 0 20px white;
            pointer-events: none;
            z-index: 1500;
            animation: goalFly 1.2s ease-out forwards;
            white-space: nowrap;
        }

        @keyframes goalFly {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -30px) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -80px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -120px) scale(0.8); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; margin-bottom: 40px; }
            .menu a { padding: 12px 20px; font-size: 1rem; min-width: 160px; box-shadow: 0 8px 0 #8B6914, 0 6px 12px rgba(0,0,0,0.4); }
            .version-box { padding: 6px 14px; font-size: 11px; bottom: 15px; right: 15px; }
            .ball { font-size: 2.8rem; }
        }
        p {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 170, 51, 1);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 auto;
            pointer-events: none;
            z-index: 105;
            font-weight: 400;
            animation: fadePulse 3s infinite ease-in-out;
        }
        .copyright {
            position: fixed;
            bottom: 16px;
            left: 16px;
            color: rgba(255, 215, 0, 0.5);
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            z-index: 999;
            font-family: 'Montserrat', sans-serif;
            pointer-events: none;  /* để không cản click */
            transition: opacity 0.3s;
        }
        @media (max-width: 600px) {
            .copyright {
                bottom: 10px;
                left: 10px;
                font-size: 10px;
                padding: 3px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Lớp chấm cỏ -->
    <div class="grass-dots"></div>

    <h1>NAM FC ONLINE</h1>

    <div class="menu">
        <a href="shop.html">🛒 MUA PACK</a>
        <a href="/calculator/">📊 TÍNH OVR</a>
        <a href="/logs/">📜 LỊCH SỬ</a>
    </div>

    <p>Ấn vào trái bóng hoặc phím space để chơi với nó</p>

    <div class="version-box" id="versionBox">Version: loading…</div>

    <!-- TRÁI BÓNG BAY -->
    <div class="ball" id="flyingBall">⚽</div>

    <div class="copyright">
        &copy; Pham Hoang Nam
    </div>

    <script>
        (function(){
            "use strict";

            // ---------- VERSION LOADER ----------
            const versionEl = document.getElementById('versionBox');
            async function loadVersion() {
                try {
                    const res = await fetch('js/version.json');
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    versionEl.textContent = `Version: ${data.version}`;
                } catch(e) {
                    console.warn('⚠️ Version failed:', e);
                    versionEl.textContent = 'Version: ⚠️';
                    setTimeout(() => {
                        if(versionEl.textContent === 'Version: ⚠️') versionEl.textContent = 'Version: dev';
                    }, 2000);
                }
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', loadVersion);
            } else {
                loadVersion();
            }

            // ---------- BÓNG BAY VẬT LÝ ----------
            const ball = document.getElementById('flyingBall');
            // Vị trí ban đầu: gần tiêu đề
            const h1 = document.querySelector('h1');
            const h1Rect = h1.getBoundingClientRect();
            
            let x = h1Rect.left + h1Rect.width / 2 - 25; // căn giữa
            let y = h1Rect.bottom - 30;
            let vx = 3.5;  // vận tốc ngang
            let vy = 0;    // vận tốc dọc
            const gravity = 0.5;
            const bounce = 0.7;  // hệ số nảy
            const friction = 0.99; // ma sát ngang
            
            // Giới hạn sân (để bóng không chạy mất)
            let minX = 20, maxX = window.innerWidth - 80;
            let groundY = window.innerHeight - 80; // mặt đất
            
            function updateBallPosition() {
                ball.style.left = x + 'px';
                ball.style.top = y + 'px';
                // Xoay nhẹ theo hướng di chuyển
                const rotate = Math.atan2(vy, vx) * 10;
                ball.style.transform = `rotate(${rotate}deg)`;
            }

            function physicsLoop() {
                // Trọng lực
                vy += gravity;
                
                // Cập nhật vị trí
                x += vx;
                y += vy;
                
                // Va chạm biên ngang
                if (x <= minX) {
                    x = minX;
                    vx = -vx * 0.9;
                } else if (x >= maxX) {
                    x = maxX;
                    vx = -vx * 0.9;
                }
                
                // Va chạm mặt đất
                if (y >= groundY) {
                    y = groundY;
                    vy = -vy * bounce;
                    // Ma sát khi chạm đất
                    vx *= 0.98;
                    
                    // Nếu vận tốc rất nhỏ thì dừng hẳn để tránh rung lắc
                    if (Math.abs(vy) < 0.5 && y >= groundY - 1) {
                        vy = 0;
                    }
                    if (Math.abs(vx) < 0.1) vx = 0;
                }
                
                // Ma sát không khí nhẹ
                vx *= friction;
                
                // Nếu gần như đứng yên, có thể reset nhẹ để đỡ tốn CPU
                if (Math.abs(vx) < 0.01 && Math.abs(vy) < 0.01 && y >= groundY - 2) {
                    vx = 0;
                    vy = 0;
                }
                
                updateBallPosition();
                
                requestAnimationFrame(physicsLoop);
            }

            // Cập nhật lại kích thước khi resize
            function updateBoundaries() {
                maxX = window.innerWidth - 80;
                groundY = window.innerHeight - 80;
                // Không cho bóng ra ngoài
                x = Math.min(maxX, Math.max(minX, x));
                y = Math.min(groundY, y);
                updateBallPosition();
            }
            
            window.addEventListener('resize', () => {
                updateBoundaries();
                // Đặt lại vị trí h1 nếu cần, nhưng giữ nguyên bóng
            });

            // Bắt đầu animation
            updateBallPosition();
            requestAnimationFrame(physicsLoop);

            // Thêm cú đá khi click vào bóng (cho vui)
            ball.addEventListener('click', (e) => {
                e.stopPropagation();
                // Đá bóng bay lên
                vy = -12;
                vx += (Math.random() - 0.5) * 8;
                // Giới hạn vx
                vx = Math.min(15, Math.max(-15, vx));
                
                // Hiệu ứng GOAL!
                showGoalPopup(e.clientX, e.clientY);
                createRipple(e.clientX, e.clientY);
            });

            // Để click xuyên qua bình thường, nhưng chúng ta đã set pointer-events: none cho .ball
            // Nhưng để đá bóng được thì cần tạm cho phép click. Giải pháp: tạo vùng bắt sự kiện riêng
            // Cách đơn giản: thay pointer-events thành auto, nhưng sẽ chặn click menu. 
            // Ta sẽ dùng một trick: chỉ bắt sự kiện trên bóng, và không cho lan ra.
            ball.style.pointerEvents = 'auto';  // Cho phép click vào bóng
            
            // Nhưng bóng không chặn menu vì nó nằm trên, ta sẽ xử lý: nếu click vào bóng thì đá, còn click menu vẫn hoạt động
            // OK vì bóng nhỏ.
            
            // ---------- MUỐI JS: HIỆU ỨNG CLICK + GOAL RANDOM ----------
            function createRipple(x, y) {
                const ripple = document.createElement('div');
                ripple.className = 'click-ripple';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            }

            function showGoalPopup(x, y) {
                const popup = document.createElement('div');
                popup.className = 'goal-popup';
                popup.textContent = 'GOAL!!!';
                popup.style.left = x + 'px';
                popup.style.top = (y - 30) + 'px';
                popup.style.transform = 'translate(-50%, -50%)';
                document.body.appendChild(popup);
                setTimeout(() => popup.remove(), 1200);
            }

            // Click toàn trang tạo hiệu ứng sân cỏ (cảm giác đá bóng)
            document.body.addEventListener('click', (e) => {
                // Không tạo nếu click vào link hoặc bóng (bóng đã có riêng)
                if (e.target.closest('a') || e.target.closest('.ball')) return;
                
                createRipple(e.clientX, e.clientY);
                
                // Thỉnh thoảng xuất hiện chữ "GOAL" ngẫu nhiên
                if (Math.random() > 0.6) {
                    showGoalPopup(e.clientX, e.clientY);
                }
                
                // Đôi khi làm bóng nảy nhẹ nếu click gần bóng
                const ballRect = ball.getBoundingClientRect();
                const ballCenterX = ballRect.left + ballRect.width/2;
                const ballCenterY = ballRect.top + ballRect.height/2;
                const dist = Math.hypot(e.clientX - ballCenterX, e.clientY - ballCenterY);
                if (dist < 150) {
                    vy = -8;
                    vx += (e.clientX - ballCenterX) * 0.1;
                    vx = Math.min(12, Math.max(-12, vx));
                }
            });

            // Thêm phím Space để đá bóng
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    vy = -15;
                    vx += (Math.random() - 0.5) * 10;
                    vx = Math.min(18, Math.max(-18, vx));
                    // Popup ở giữa màn hình
                    showGoalPopup(window.innerWidth/2, window.innerHeight/2);
                }
                // Phím G để hô GOAL
                if (e.code === 'KeyG') {
                    showGoalPopup(window.innerWidth/2, window.innerHeight/2);
                }
            });

            // Hiệu ứng di chuột tạo ánh sáng theo (spotlight effect)
            document.body.addEventListener('mousemove', (e) => {
                // Tạo radial gradient di chuyển (CSS không làm được realtime dễ, nên dùng style background)
                const x = (e.clientX / window.innerWidth) * 100;
                const y = (e.clientY / window.innerHeight) * 100;
                document.body.style.background = `
                    repeating-linear-gradient(45deg, rgba(20, 80, 20, 0.3) 0px, rgba(20, 80, 20, 0.3) 2px, transparent 2px, transparent 8px),
                    radial-gradient(circle at ${x}% ${y}%, #3da34a 0%, #1a5c25 40%, #0a3a12 100%)
                `;
            });

            // Reset background khi chuột rời khỏi cửa sổ
            document.body.addEventListener('mouseleave', () => {
                document.body.style.background = `
                    repeating-linear-gradient(45deg, rgba(20, 80, 20, 0.3) 0px, rgba(20, 80, 20, 0.3) 2px, transparent 2px, transparent 8px),
                    radial-gradient(circle at 30% 40%, #2d8c3c 0%, #1a5c25 50%, #0a3a12 100%)
                `;
            });

            // Thông báo chào mừng khi load xong (muối nhẹ)
            window.addEventListener('load', () => {
                setTimeout(() => {
                    showGoalPopup(window.innerWidth/2, window.innerHeight/3);
                }, 500);
                console.log('%cWARNING: This project is copyrighted; please read the license before using any content from the project.', 'font-size: 20px; color: red; background: #0a2f1a; padding: 5px; border-radius: 5px;');

                console.log('%cNam FC Online © PHAM HOANG NAM', 'font-size: 20px; color: gold; background: #0a2f1a; padding: 5px; border-radius: 5px;');
                
                console.log('%c🥅 Sân cỏ đã sẵn sàng! Nhấn SPACE để đá bóng!', 'font-size: 14px; color: #fff;');
            });

            // Cập nhật boundaries sau khi load hoàn tất (đề phòng font ảnh hưởng)
            setTimeout(updateBoundaries, 100);
            window.addEventListener('resize', updateBoundaries);
        })();
    </script>
</body>
</html>
